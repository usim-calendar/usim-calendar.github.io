<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Us in Moments</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,300..700&display=swap" rel="stylesheet">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { font-family: 'Inter', -apple-system, sans-serif;
           background: #03050a; color: #eaeef2; line-height: 1.7;
           min-height: 100vh; display: flex; flex-direction: column;
           background-image:
             radial-gradient(ellipse 80% 60% at 50% -20%, rgba(99, 102, 241, 0.12), transparent),
             radial-gradient(ellipse 50% 40% at 0% 60%, rgba(139, 92, 246, 0.06), transparent),
             radial-gradient(ellipse 40% 40% at 100% 80%, rgba(59, 130, 246, 0.06), transparent);
           background-attachment: fixed; }
    body::before { content: ''; position: fixed; inset: 0;
      background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noise'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noise)' opacity='0.035'/%3E%3C/svg%3E");
      pointer-events: none; z-index: 0; }
    .container { max-width: 640px; margin: 0 auto; padding: 40px 24px; flex: 1; width: 100%; position: relative; z-index: 1; }

    .hero { text-align: center; padding: 80px 0 48px; }
    h1 { font-size: clamp(2.2rem, 5vw, 3.2rem); font-weight: 700;
         letter-spacing: -0.03em; line-height: 1.1; margin-bottom: 12px; }
    h1 span { background: linear-gradient(135deg, #818cf8 0%, #c084fc 50%, #f472b6 100%);
      -webkit-background-clip: text; -webkit-text-fill-color: transparent;
      background-clip: text; }
    .tagline { color: #7f8a9a; font-size: 1.05rem; max-width: 420px; margin: 0 auto 32px; }

    .btn { display: inline-flex; align-items: center; gap: 8px;
      padding: 12px 28px; border-radius: 12px; font-size: 14px; font-weight: 500;
      text-decoration: none; transition: all .25s ease; font-family: inherit; }
    .btn-primary { background: linear-gradient(135deg, #6366f1, #8b5cf6);
      color: #fff; box-shadow: 0 4px 20px rgba(99, 102, 241, 0.3); }
    .btn-primary:hover { transform: translateY(-2px); box-shadow: 0 8px 30px rgba(99, 102, 241, 0.45); }

    .glass { background: rgba(255,255,255,0.03); backdrop-filter: blur(20px) saturate(1.4);
      -webkit-backdrop-filter: blur(20px) saturate(1.4);
      border: 1px solid rgba(255,255,255,0.06); border-radius: 20px;
      padding: 28px; position: relative; overflow: hidden; margin-bottom: 16px; }
    .glass::before { content: ''; position: absolute; top: 0; left: 0; right: 0; height: 1px;
      background: linear-gradient(90deg, transparent, rgba(255,255,255,0.08), transparent); }
    .glass h2 { font-size: 13px; font-weight: 600; letter-spacing: 1.5px;
      text-transform: uppercase; color: #6366f1; margin-bottom: 16px; }
    .glass p { font-size: 14px; color: #7f8a9a; margin-bottom: 8px; }
    .glass code { background: rgba(255,255,255,0.06); padding: 2px 8px; border-radius: 6px;
      color: #a5b4fc; font-size: 13px; font-family: 'SF Mono', 'Fira Code', monospace; }
    .glass ul { list-style: none; padding: 0; }
    .glass ul li { font-size: 14px; color: #c8d0da; padding: 8px 0;
      border-bottom: 1px solid rgba(255,255,255,0.04);
      display: flex; align-items: center; gap: 10px; }
    .glass ul li:last-child { border-bottom: none; }
    .glass a { color: #a5b4fc; text-decoration: none; }
    .glass a:hover { text-decoration: underline; }

    footer { text-align: center; padding: 32px 0; color: #4b5563; font-size: 13px;
      border-top: 1px solid rgba(255,255,255,0.04); position: relative; z-index: 1; }
  </style>
</head>
<body>
<div class="container">
  <div class="hero">
    <h1><span>Us in Moments</span></h1>
    <p class="tagline">手机日历订阅服务</p>
    <a href="https://calendar.usim.online/" class="btn btn-primary">服务首页</a>
  </div>

  <div class="glass">
    <h2>使用方式</h2>
    <p>将以下地址添加到手机日历的订阅功能：</p>
    <p style="margin-top:12px;"><code>https://calendar.usim.online/&lt;订阅码&gt;.ics</code></p>
    <p style="margin-top:4px;font-size:13px;">订阅码请向服务提供者索取。</p>
  </div>

  <div class="glass">
    <h2>支持内容</h2>
    <ul>
      <li><span>🏮</span> 农历日期</li>
      <li><span>🇨🇳</span> 中国法定节假日</li>
      <li><span>🎎</span> 中国传统节日</li>
      <li><span>🌏</span> 多国节假日</li>
    </ul>
  </div>

  <div class="glass">
    <h2>反馈</h2>
    <p>欢迎在 <a href="https://github.com/usim-calendar/usim-calendar.github.io/issues/new">GitHub Issues</a> 提交建议。</p>
  </div>

  <footer>&copy; 2025–2026 Us in Moments</footer>
</div>
</body>
</html>
